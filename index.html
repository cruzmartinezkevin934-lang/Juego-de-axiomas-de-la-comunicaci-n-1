<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Batalla de Patos - Axiomas de la Comunicación</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="inicio" class="pantalla">

<h1>🦆 BATALLA DE PATOS 🦆</h1>

<h2>Axiomas de la Comunicación</h2>

<p>
Responde correctamente para atacar o defenderte.
</p>

<button id="btnJugar">
JUGAR
</button>

</div>

<div id="juego" class="oculto">

<header>

<div class="vidas">

<h3>TÚ</h3>

<div class="barra">

<div id="vidaJugador"></div>

</div>

</div>

<div class="centro">

<h2 id="estado">
Tu turno de ataque
</h2>

<h3 id="ronda">
Ronda 1
</h3>

</div>

<div class="vidas">

<h3>ENEMIGO</h3>

<div class="barra">

<div id="vidaEnemigo"></div>

</div>

</div>

</header>

<main>

<div class="campo">

<div id="jugador" class="pato izquierda">

<div class="cuerpo"></div>

<div class="cabeza"></div>

<div class="ojo"></div>

<div class="pico"></div>

<div class="pistola"></div>

</div>

<div id="bala"></div>

<div id="enemigo" class="pato derecha">

<div class="cuerpo"></div>

<div class="cabeza"></div>

<div class="ojo"></div>

<div class="pico"></div>

<div class="pistola"></div>

</div>

</div>

<div class="panelPregunta">

<h2 id="pregunta"></h2>

<button class="respuesta" id="r0"></button>

<button class="respuesta" id="r1"></button>

<button class="respuesta" id="r2"></button>

</div>

</main>

</div>

<div id="victoria" class="pantalla oculto">

<h1>🏆</h1>

<h2>¡GANASTE!</h2>

<p>
Has derrotado al pato enemigo.
</p>

<button onclick="location.reload()">
Volver a jugar
</button>

</div>

<div id="derrota" class="pantalla oculto">

<h1>💀</h1>

<h2>PERDISTE</h2>

<p>
El pato enemigo ganó la batalla.
</p>

<button onclick="location.reload()">
Intentar otra vez
</button>

</div>

<script src="preguntas.js"></script>

<script src="script.js"></script>

</body>
</html>
